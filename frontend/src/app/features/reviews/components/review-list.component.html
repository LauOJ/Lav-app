<h3>{{ 'review_list.title' | translate }}</h3>

@if (reviews().length === 0) {
  <p>{{ 'review_list.empty' | translate }}</p>
} @else {
  <ul>
    @for (review of reviews(); track review.id) {
      <app-review-item
        [review]="review"
        [currentUser]="currentUser()"
        (delete)="onDeleteReview($event)"
        (save)="onUpdateReview($event)"
      />
    }
  </ul>
}
