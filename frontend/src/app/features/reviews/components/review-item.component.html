@if (!isEditing()) {
    <li>
      <p>
        <strong>Limpieza:</strong> {{ review().cleanliness_rating }} / 5<br />
        <strong>Seguridad percibida:</strong> {{ review().felt_safe ? 'Sí' : 'No' }}
      </p>
  
      @if (review().comment) {
        <p>{{ review().comment }}</p>
      }
  
      @if (isMine()) {
        <div>
          <button type="button" (click)="onEdit()"><span aria-hidden="true">✏️</span> Editar</button>
          <button type="button" (click)="onDelete()"><span aria-hidden="true">🗑️</span> Borrar</button>
        </div>
      }
    </li>
  }
  
  @if (isEditing()) {
    <li>
      <label>
        Limpieza:
        <input type="number" min="1" max="5" [value]="cleanliness()" (input)="cleanliness.set($any($event.target).valueAsNumber)" />
      </label>
  
      <br />
  
      <label>
        Comentario:
        <textarea [value]="comment()" (input)="comment.set($any($event.target).value)"></textarea>
      </label>
  
      <br />
  
      <div class="actions">
        <button type="button" class="btn btn-primary" (click)="onSave()">Guardar</button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
      </div>
    </li>
  }
