<div class="page-container">
  <h1 class="page-title">{{ 'auth.register.title' | translate }}</h1>

  <div class="section">
    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label for="register-email">Email</label>
        <input
          id="register-email"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="register-password">{{ 'auth.register.password_label' | translate }}</label>
        <input
          id="register-password"
          type="password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          required
          minlength="8"
        />
      </div>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }

      <div class="actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? ('auth.register.submit_loading' | translate) : ('auth.register.submit' | translate) }}
        </button>
      </div>
    </form>
  </div>

  <div class="section">
    <p>
      {{ 'auth.register.already_account' | translate }}
      <a class="btn btn-secondary" [routerLink]="['/login']">{{ 'auth.register.login_link' | translate }}</a>
    </p>
  </div>
</div>
