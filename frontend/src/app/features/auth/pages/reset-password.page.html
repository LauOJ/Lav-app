<div class="page-container">
  <h1 class="page-title">{{ 'auth.reset_password.title' | translate }}</h1>

  @if (success()) {
    <div class="section">
      <p class="form-success">{{ 'auth.reset_password.success' | translate }}</p>
      <a class="btn btn-primary" [routerLink]="['/login']">{{ 'auth.forgot_password.back_to_login' | translate }}</a>
    </div>
  } @else {
    <div class="section">
      <form (submit)="onSubmit(); $event.preventDefault()">
        <div class="form-group">
          <label for="reset-password">{{ 'auth.reset_password.password_label' | translate }}</label>
          <input
            id="reset-password"
            type="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            required
            minlength="8"
          />
        </div>

        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }

        <div class="actions">
          <button type="submit" class="btn btn-primary" [disabled]="loading() || !token">
            {{ loading() ? ('auth.reset_password.submit_loading' | translate) : ('auth.reset_password.submit' | translate) }}
          </button>
        </div>
      </form>
    </div>

    <div class="section">
      <a class="btn btn-ghost" [routerLink]="['/login']">{{ 'auth.reset_password.back_to_login' | translate }}</a>
    </div>
  }
</div>
