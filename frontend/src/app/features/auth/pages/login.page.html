<div class="page-container">
  <a class="map-link" [routerLink]="['/explore']">
    <app-lucide-icon icon="locate" />
    {{ 'nav.back_to_map' | translate }}
  </a>

  <h1 class="page-title">{{ 'auth.login.title' | translate }}</h1>

  <div class="section">
    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input
          id="login-email"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="login-password">{{ 'auth.login.password_label' | translate }}</label>
        <div class="input-wrapper">
          <input
            id="login-password"
            [type]="showPassword() ? 'text' : 'password'"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            required
          />
          <button
            type="button"
            class="password-toggle"
            (click)="showPassword.set(!showPassword())"
            [attr.aria-label]="(showPassword() ? 'auth.hide_password' : 'auth.show_password') | translate"
          >
            <app-lucide-icon [icon]="showPassword() ? 'eye-off' : 'eye'" />
          </button>
        </div>
      </div>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }

      <div class="actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? ('auth.login.submit_loading' | translate) : ('auth.login.submit' | translate) }}
        </button>
        <a class="btn btn-ghost" [routerLink]="['/forgot-password']">{{ 'auth.forgot_password.link' | translate }}</a>
      </div>
    </form>
  </div>

  <div class="section">
    <p>
      {{ 'auth.login.no_account' | translate }}
      <a class="btn btn-secondary" [routerLink]="['/register']">{{ 'auth.login.register_link' | translate }}</a>
    </p>
  </div>
</div>
