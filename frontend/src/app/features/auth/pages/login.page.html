<div class="page-container">
  <h1 class="page-title">{{ 'auth.login.title' | translate }}</h1>

  <div class="section">
    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input
          id="login-email"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="login-password">{{ 'auth.login.password_label' | translate }}</label>
        <input
          id="login-password"
          type="password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          required
        />
      </div>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }

      <div class="actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          {{ loading() ? ('auth.login.submit_loading' | translate) : ('auth.login.submit' | translate) }}
        </button>
      </div>
    </form>
  </div>

  <div class="section">
    <p>
      {{ 'auth.login.no_account' | translate }}
      <a class="btn btn-secondary" [routerLink]="['/register']">{{ 'auth.login.register_link' | translate }}</a>
    </p>
    <a class="btn btn-ghost" [routerLink]="['/explore']">{{ 'nav.explore' | translate }}</a>
  </div>
</div>
