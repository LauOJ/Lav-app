<div class="page-container">
  <h1 class="page-title">{{ 'auth.forgot_password.title' | translate }}</h1>

  @if (submitted()) {
    <div class="section">
      <p class="form-success">{{ 'auth.forgot_password.success' | translate }}</p>
    </div>
  } @else {
    <div class="section">
      <p>{{ 'auth.forgot_password.intro' | translate }}</p>
      <form (submit)="onSubmit(); $event.preventDefault()">
        <div class="form-group">
          <label for="forgot-email">{{ 'auth.forgot_password.email_label' | translate }}</label>
          <input
            id="forgot-email"
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            required
          />
        </div>

        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }

        <div class="actions">
          <button type="submit" class="btn btn-primary" [disabled]="loading()">
            {{ loading() ? ('auth.forgot_password.submit_loading' | translate) : ('auth.forgot_password.submit' | translate) }}
          </button>
        </div>
      </form>
    </div>
  }

  <div class="section">
    <a class="btn btn-ghost" [routerLink]="['/login']">{{ 'auth.forgot_password.back_to_login' | translate }}</a>
  </div>
</div>
