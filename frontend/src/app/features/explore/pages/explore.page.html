<section class="explore-page" [class.sheet-open]="selectedWc()">
  <form class="search-panel" (submit)="onSearchLocation(); $event.preventDefault()">
    <input
      type="text"
      placeholder="Buscar lugar o dirección"
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
      aria-label="Buscar lugar o dirección"
    />
    <button type="submit" [disabled]="searchLoading()">Buscar</button>
  </form>
  <div class="filters-panel" role="group" aria-label="Filtros del mapa">
    <div class="filters-quick">
      <button
        type="button"
        class="filter-pill filter-button"
        [class.active]="filters().clean"
        [class.tooltip-visible]="activeTooltipFilter() === 'clean'"
        [attr.aria-pressed]="filters().clean"
        (focusin)="setFilterTooltip('clean')"
        (focusout)="setFilterTooltip(null)"
        (click)="onToggleFilter('clean', !filters().clean); showFilterTooltipTemporarily('clean')"
        aria-label="Limpio"
        title="Limpio"
      >
        <app-lucide-icon icon="star" />
        <span class="tooltip">Limpio</span>
      </button>
      <button
        type="button"
        class="filter-pill filter-button"
        [class.active]="filters().safe"
        [class.tooltip-visible]="activeTooltipFilter() === 'safe'"
        [attr.aria-pressed]="filters().safe"
        (focusin)="setFilterTooltip('safe')"
        (focusout)="setFilterTooltip(null)"
        (click)="onToggleFilter('safe', !filters().safe); showFilterTooltipTemporarily('safe')"
        aria-label="Seguro"
        title="Seguro"
      >
        <app-lucide-icon icon="lock" />
        <span class="tooltip">Seguro</span>
      </button>
      <button
        type="button"
        class="filter-pill filter-button"
        [class.active]="filters().accessible"
        [class.tooltip-visible]="activeTooltipFilter() === 'accessible'"
        [attr.aria-pressed]="filters().accessible"
        (focusin)="setFilterTooltip('accessible')"
        (focusout)="setFilterTooltip(null)"
        (click)="onToggleFilter('accessible', !filters().accessible); showFilterTooltipTemporarily('accessible')"
        aria-label="Accesible"
        title="Accesible"
      >
        <app-lucide-icon icon="accessibility" />
        <span class="tooltip">Accesible</span>
      </button>
      <button
        type="button"
        class="filter-pill filter-button"
        [class.active]="filters().withPaper"
        [class.tooltip-visible]="activeTooltipFilter() === 'withPaper'"
        [attr.aria-pressed]="filters().withPaper"
        (focusin)="setFilterTooltip('withPaper')"
        (focusout)="setFilterTooltip(null)"
        (click)="onToggleFilter('withPaper', !filters().withPaper); showFilterTooltipTemporarily('withPaper')"
        aria-label="Con papel"
        title="Con papel"
      >
        <app-lucide-icon icon="droplets" />
        <span class="tooltip">Con papel</span>
      </button>
      <button
        type="button"
        class="filter-pill filter-button"
        [class.active]="filters().enoughReviews"
        [class.tooltip-visible]="activeTooltipFilter() === 'enoughReviews'"
        [attr.aria-pressed]="filters().enoughReviews"
        (focusin)="setFilterTooltip('enoughReviews')"
        (focusout)="setFilterTooltip(null)"
        (click)="onToggleFilter('enoughReviews', !filters().enoughReviews); showFilterTooltipTemporarily('enoughReviews')"
        aria-label="Con suficientes reseñas"
        title="Con suficientes reseñas"
      >
        <app-lucide-icon icon="baby" />
        <span class="tooltip">Con suficientes reseñas</span>
      </button>
    </div>
  </div>
  <button
    type="button"
    class="locate-button"
    (click)="onLocateUser()"
    aria-label="Centrar en mi ubicación"
    title="Centrar en mi ubicación"
  >
    📍
  </button>

  <app-map-view
    [wcs]="filteredWcs()"
    [selectedWcId]="selectedWcId()"
    [userLocation]="userLocation()"
    (wcSelected)="onSelectWc($event)"
    (addWcAt)="onAddWcAt($event)"
  ></app-map-view>

  @if (loading()) {
    <div class="status-banner">Cargando WCs...</div>
  }

  @if (error()) {
    <div class="status-banner error">{{ error() }}</div>
  }

  @if (searchError()) {
    <div class="status-banner error">{{ searchError() }}</div>
  }

  @if (geoError()) {
    <div class="status-banner error">{{ geoError() }}</div>
  }

  @if (showEmptyState()) {
    <div class="status-banner empty">
      No hay WCs que cumplan estos filtros. Prueba a desactivar algún filtro.
    </div>
  }

  @if (selectedWc()) {
    <app-wc-detail-sheet
      [wc]="selectedWc()!"
      [userLocation]="userLocation()"
      (close)="onCloseSheet()"
    ></app-wc-detail-sheet>
  }
</section>
