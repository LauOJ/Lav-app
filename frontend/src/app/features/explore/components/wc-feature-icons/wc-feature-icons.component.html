<div class="feature-icons" role="list">
  @for (feature of featureItems(); track feature.key) {
    <button
      type="button"
      class="feature-icon"
      [ngClass]="scoreClass(feature.score)"
      role="listitem"
      [attr.aria-label]="feature.label + ': ' + scoreLabel(feature.score)"
      [attr.title]="feature.label + ': ' + scoreLabel(feature.score)"
      (pointerdown)="onPointerDown($event, feature.key)"
      (pointerup)="onPointerUp()"
      (pointerleave)="onPointerUp()"
      (pointercancel)="onPointerUp()"
    >
      <app-lucide-icon [icon]="feature.icon" class="icon" />
      @if (activeFeature() === feature.key) {
        <span class="tooltip" role="tooltip">
          {{ feature.label }}: {{ scoreLabel(feature.score) }}
        </span>
      }
    </button>
  }
</div>
