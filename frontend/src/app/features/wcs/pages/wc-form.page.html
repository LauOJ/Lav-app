<div class="page-container">
  <h2 class="page-title">{{ (isEditMode() ? 'wc_form.title_edit' : 'wc_form.title_create') | translate }}</h2>

  <div class="actions">
    <button class="btn btn-secondary" [routerLink]="['/explore']">{{ 'wc_form.back' | translate }}</button>
  </div>

  <div class="section">
    <form (submit)="onSubmit(); $event.preventDefault()">
  <div class="form-group">
    <label for="wc-name">{{ 'wc_form.name_label' | translate }}</label>
    <input
      id="wc-name"
      type="text"
      [value]="form().name"
      (input)="updateName($any($event.target).value)"
      [placeholder]="'wc_form.name_placeholder' | translate"
      required
    />
  </div>

  <div class="form-group">
    <label for="wc-latitude">{{ 'wc_form.lat_label' | translate }}</label>
    <input
      id="wc-latitude"
      type="number"
      step="any"
      [value]="form().latitude"
      (input)="updateLatitude($any($event.target).valueAsNumber)"
      required
    />
  </div>

  <div class="form-group">
    <label for="wc-longitude">{{ 'wc_form.lng_label' | translate }}</label>
    <input
      id="wc-longitude"
      type="number"
      step="any"
      [value]="form().longitude"
      (input)="updateLongitude($any($event.target).valueAsNumber)"
      required
    />
  </div>

  <fieldset class="fieldset-reset">
    <legend>{{ 'wc_form.features_legend' | translate }}</legend>
    <div class="checkbox-group">
      <div>
        <input
          id="wc-is_public"
          type="checkbox"
          [checked]="form().is_public"
          (change)="toggleFlag('is_public', $any($event.target).checked)"
        />
        <label for="wc-is_public">{{ 'wc_form.public_label' | translate }}</label>
      </div>
    </div>
  </fieldset>

  <div class="form-group">
    <label for="wc-description">{{ 'wc_form.description_label' | translate }}</label>
    <textarea
      id="wc-description"
      [value]="form().description || ''"
      (input)="updateDescription($any($event.target).value)"
    ></textarea>
  </div>

  @if (error()) {
    <p id="wc-form-errors" class="form-error" role="alert">{{ error() }}</p>
  }

  <div class="actions">
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="loading() || loadingWc()"
      [attr.aria-describedby]="error() ? 'wc-form-errors' : null"
    >
      @if (isEditMode()) {
        {{ loading() ? ('wc_form.submit_saving' | translate) : ('wc_form.submit_save' | translate) }}
      } @else {
        {{ loading() ? ('wc_form.submit_creating' | translate) : ('wc_form.submit_create' | translate) }}
      }
    </button>
  </div>
    </form>
  </div>
</div>
