<div class="page-container">
  <h2 class="page-title">{{ isEditMode() ? 'Editar WC' : 'Crear nuevo WC' }}</h2>

  <div class="actions">
    <button class="btn btn-secondary" [routerLink]="['/explore']">← Volver al mapa</button>
  </div>

  <div class="section">
    <form (submit)="onSubmit(); $event.preventDefault()">
  <div class="form-group">
    <label for="wc-name">Nombre del lugar *</label>
    <input
      id="wc-name"
      type="text"
      [value]="form().name"
      (input)="updateName($any($event.target).value)"
      placeholder="Ej.: Biblioteca Jaume Fuster, Bar La Perla, Estación de Sants"
      required
    />
  </div>

  <div class="form-group">
    <label for="wc-latitude">Latitud *</label>
    <input
      id="wc-latitude"
      type="number"
      step="any"
      [value]="form().latitude"
      (input)="updateLatitude($any($event.target).valueAsNumber)"
      required
    />
  </div>

  <div class="form-group">
    <label for="wc-longitude">Longitud *</label>
    <input
      id="wc-longitude"
      type="number"
      step="any"
      [value]="form().longitude"
      (input)="updateLongitude($any($event.target).valueAsNumber)"
      required
    />
  </div>

  <fieldset class="fieldset-reset">
    <legend>Características</legend>
    <div class="checkbox-group">
      <div>
        <input
          id="wc-is_public"
          type="checkbox"
          [checked]="form().is_public"
          (change)="toggleFlag('is_public', $any($event.target).checked)"
        />
        <label for="wc-is_public">Baño público</label>
      </div>
    </div>
  </fieldset>

  <div class="form-group">
    <label for="wc-description">Descripción</label>
    <textarea
      id="wc-description"
      [value]="form().description || ''"
      (input)="updateDescription($any($event.target).value)"
    ></textarea>
  </div>

  @if (error()) {
    <p id="wc-form-errors" class="form-error" role="alert">{{ error() }}</p>
  }

  <div class="actions">
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="loading() || loadingWc()"
      [attr.aria-describedby]="error() ? 'wc-form-errors' : null"
    >
      @if (isEditMode()) {
        {{ loading() ? 'Guardando…' : 'Guardar cambios' }}
      } @else {
        {{ loading() ? 'Creando…' : 'Crear WC' }}
      }
    </button>
  </div>
    </form>
  </div>
</div>
